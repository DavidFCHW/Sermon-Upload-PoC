name: High-Quality Video Production Engine
on:
  repository_dispatch:
    types: [sermon_uploaded]

jobs:
  build-and-render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Church Assets
        uses: actions/checkout@v4

      - name: Setup Headless FFmpeg
        uses: rlespinasse/github-action-ffmpeg@v1

      # The payload fields are passed dynamically from Make.com
      - name: Ingest Raw Sermon File
        run: |
          curl -L "${{ github.event.client_payload.fileId }}" -o raw_sermon.mov

      - name: Process Visual Elements and Render
        run: |
          echo "file 'assets/intro.mp4'" > render_manifest.txt
          echo "file 'raw_sermon.mov'" >> render_manifest.txt
          echo "file 'assets/outro.mp4'" >> render_manifest.txt
          ffmpeg -f concat -safe 0 -i render_manifest.txt -c:v libx264 -crf 18 -preset medium -c:a aac -b:a 320k row-${{ github.event.client_payload.sheetRowId }}.mp4

      - name: Export Master File back to Google Drive
        uses: adityassandilya/gdrive-upload-action@v1
        with:
          credentials: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_KEY }}
          filename: 'row-${{ github.event.client_payload.sheetRowId }}.mp4'
          folderId: '${{ github.event.client_payload.targetFolderId }}'
          overwrite: 'true'